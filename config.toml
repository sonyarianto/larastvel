[app]
name = "Larastvel"
url = "http://localhost:8080"
env = "local"
debug = true

[database]
driver = "sqlite"
host = "127.0.0.1"
port = 3306
database = "larastvel.db"
username = "root"
password = ""

[logging]
level = "debug"
format = "text"

[view]
engine = "tera"
paths = ["resources/views"]

[broadcasting]
default = "log"
app_id = ""
key = ""
secret = ""
cluster = "mt1"
encrypted = true

[cache]
default = "array"
prefix = ""
table = "cache"
file_path = "storage/framework/cache/data"

[password_reset]
table = "password_reset_tokens"
expire_seconds = 3600
throttle_seconds = 60
